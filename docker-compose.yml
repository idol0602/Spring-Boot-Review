version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: springboot-postgres
    environment:
      POSTGRES_DB: springboot_review
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - springboot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: springboot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - springboot-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: springboot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP port (app kết nối)
      - "15672:15672"  # Management UI: http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - springboot-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: springboot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - springboot-network

  gateway-service:
    build: .
    container_name: gateway-service
    ports:
      - "8080:8080"
    command: ["java", "-jar", "gateway.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=gateway
      - SPRING_MAIN_WEB_APPLICATION_TYPE=reactive
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/springboot_review
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - springboot-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      product-service:
        condition: service_started
      payment-service:
        condition: service_started

  user-service:
    build: .
    container_name: user-service
    ports:
      - "8081:8081"
    command: ["java", "-jar", "user.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=user
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/springboot_review
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - springboot-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    build: .
    container_name: order-service
    ports:
      - "8082:8082"
    command: ["java", "-jar", "order.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=order
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/springboot_review
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - springboot-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  product-service:
    build: .
    container_name: product-service
    ports:
      - "8083:8083"
    command: ["java", "-jar", "product.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=product
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/springboot_review
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - springboot-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build: .
    container_name: payment-service
    ports:
      - "8084:8084"
    command: ["java", "-jar", "payment.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=payment
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/springboot_review
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE:-MOMOBKUN20180529}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY:-klm05TvNBzhg7h7j}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY:-at67qH6mk8w5Y1nAyMoYKMWACiEi2bsa}
      - MOMO_ENDPOINT=${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      - MOMO_REDIRECT_URL=${MOMO_REDIRECT_URL:-http://localhost:8080/api/payment/momo/return}
      - MOMO_IPN_URL=${MOMO_IPN_URL:-http://localhost:8080/api/payment/momo/callback}
    networks:
      - springboot-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  springboot-network:
    driver: bridge