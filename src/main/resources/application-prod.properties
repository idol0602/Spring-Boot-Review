# Production Environment Configuration
# Note: spring.profiles.active must be in application.properties, not in profile-specific files

# ==================== Database Configuration ====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=false

# ==================== JPA/Hibernate ====================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# ==================== Redis ====================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000ms
spring.data.redis.jedis.pool.max-active=16
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=2

# ==================== Logging ====================
logging.level.root=WARN
logging.level.nguyennhatquan.springbootreview=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.file.name=/var/log/springboot/application.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# ==================== Server ====================
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=2048
server.tomcat.threads.max=500
server.tomcat.threads.min-spare=50
server.tomcat.max-connections=50000
server.tomcat.accept-count=500
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false
server.error.include-stacktrace=never

# ==================== JWT ====================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Jackson ====================
spring.jackson.serialization.indent-output=false
spring.jackson.serialization.write-big-decimal-as-plain=true

