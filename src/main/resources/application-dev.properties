# Development Environment Configuration
# Note: spring.profiles.active must be in application.properties, not in profile-specific files

# ==================== Database Configuration ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/springboot_review
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ==================== JPA/Hibernate ====================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==================== Redis ====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# ==================== Logging ====================
logging.level.root=INFO
logging.level.nguyennhatquan.springbootreview=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== Server ====================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true

# ==================== JWT ====================
jwt.secret=dev-secret-key-min-32-chars-for-hs512-long
jwt.expiration=86400000

